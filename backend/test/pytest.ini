[pytest]
asyncio_mode = auto
# Collects: test/crud/* and test/test_*_endpoints.py (no shell glob needed).
testpaths =
    crud
    .
norecursedirs =
    call_test
    support
    .git
    __pycache__
    .pytest_cache
pythonpath =
    ../src
    .
python_files =
    test_*.py
    test_*_endpoints.py
python_classes = Test*
python_functions = test_*
addopts =
    -ra
    --strict-markers
markers =
    unit: Fast unit tests with mocked external dependencies
    integration: Tests that exercise collaborating modules (e.g. repositories)
    system: End-to-end workflow tests through the HTTP API layer
filterwarnings =
    ignore::DeprecationWarning
